<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatToWear - 마이페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="main-body">

<nav class="navbar">
    <a href="wardrobe.html" class="nav-item">옷장</a>
    <a href="main.html" class="nav-item">홈</a>
    <a href="mypage.html" class="nav-item active">마이</a>
</nav>

<div class="container main-container">
    <div class="wardrobe-card">
        <div class="mypage-content">
            <h2 class="welcome-msg">안녕하세요! <span class="user-name" id="display-nickname">회원</span>님!</h2>

            <div class="info-section">
                <div class="constitution-info-box" style="margin-bottom: 15px;">
                    <p class="info-label" style="font-size: 14px; color: #777; margin-bottom: 4px;">
                        기본 체질 : <span class="info-value" id="display-base-constitution" style="font-weight: normal;">보통 / 잘 모름</span>
                    </p>
                    <p class="info-label" style="font-size: 16px;">
                        현재 내 체질 : <span class="info-value" id="display-constitution" style="font-weight: bold; color: #333;">보통 / 잘 모름</span>
                    </p>
                </div>

                <div class="constitution-slider-wrapper">
                    <div class="slider-track">
                        <div class="slider-dot blue" id="dot--2"></div>
                        <div class="slider-dot blue" id="dot--1"></div>
                        <div class="slider-dot center" id="dot-0"></div>
                        <div class="slider-dot red" id="dot-1"></div>
                        <div class="slider-dot red" id="dot-2"></div>
                    </div>
                </div>
            </div>

            <div class="info-section">
                <p class="info-label">현재 설정된 지역</p>
                <p class="location-name">📍 대구광역시</p>
            </div>

            <div class="mypage-buttons">
                <button class="sub-btn" onclick="location.href='constitution.html'">내 체질 다시 설정하기</button>
                <button class="sub-btn">위치 정보 수정하기</button>
                <button class="logout-link" onclick="logout()">로그아웃</button>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const savedNickname = localStorage.getItem('nickname');
        if (savedNickname) {
            document.getElementById('display-nickname').innerText = savedNickname;
        }

        // 가입 시 설정한 최초 '기본 체질' (변하지 않는 값)
        const baseConst = localStorage.getItem('base_constitution') || "0";

        // 피드백 학습을 거쳐 계산된 최신의 '현재 내 체질' (슬라이더 및 주요 표시에 활용)
        const savedConst = localStorage.getItem('user_constitution') || "0";

        // 1. 모든 점의 활성화 클래스 제거 (초기화)
        document.querySelectorAll('.slider-dot').forEach(dot => {
            dot.classList.remove('active');
        });

        // 2. 현재 내 체질에 해당하는 점에 'active' 클래스 추가
        const activeDot = document.getElementById('dot-' + savedConst);
        if (activeDot) {
            activeDot.classList.add('active');
        }

        // 3. 텍스트 표시 매핑 데이터
        const constText = {
            "-2": "❄️ 매우 추위를 많이 탐",
            "-1": "🧊 추위를 조금 탐",
            "0": "☁️ 보통 / 잘 모름",
            "1": "☀️ 더위를 조금 탐",
            "2": "🔥 더위를 매우 많이 탐"
        };

        // 4. 각각의 영역에 텍스트 주입
        document.getElementById('display-base-constitution').innerText = constText[baseConst];
        document.getElementById('display-constitution').innerText = constText[savedConst];
    };

    function logout() {
        if(confirm("로그아웃 하시겠습니까?")) {
            // 로컬 저장소 데이터를 지울수도 있지만, 일단은 페이지 이동만 처리
            location.href = 'index.html';
        }
    }
</script>
</body>
</html>
