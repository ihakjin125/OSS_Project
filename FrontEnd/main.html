<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatToWear - 홈</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .edit-temp-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            margin-left: 8px;
            vertical-align: middle;
            transition: transform 0.2s ease;
        }
        .edit-temp-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body class="main-body">

<nav class="navbar">
    <a href="wardrobe.html" class="nav-item">옷장</a>
    <a href="main.html" class="nav-item active">홈</a>
    <a href="mypage.html" class="nav-item">마이</a>
</nav>

<div class="container main-container">
    <div class="login-card main-card">

        <div class="temp-display">
            <h2>
                🌡️ 현재 기온 : <span id="current-temp">20</span>°C ☁️
                <button type="button" class="edit-temp-btn" onclick="editTemperature()" title="기온 수동 입력">✏️</button>
            </h2>
        </div>

        <form id="recommendForm">
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="workout" name="tpo" value="workout">
                    <label for="workout">🏃 운동</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="daily" name="tpo" value="daily" checked>
                    <label for="daily">🎒 일상 / 학교</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="formal" name="tpo" value="formal">
                    <label for="formal">👔 격식 / 출근</label>
                </div>
            </div>

            <button type="submit" class="login-btn main-action-btn">오늘의 옷차림 추천받기</button>
        </form>

        <div class="recommendation-box">
            <p class="clothes-result" id="recommend-result">[반팔] / [가벼운 아우터] / [슬랙스]</p>
            <p class="weather-tip">💡 기상 팁: 오후에 비 소식이 있어요. 우산을 챙기세요! ☔</p>
        </div>

        <button class="feedback-btn">피드백 남기기</button>

    </div>
</div>

<div id="feedbackModal" class="modal-overlay">
    <div class="modal-content">
        <h3><span id="user-nickname">회원</span>님, 오늘 추천받은 옷차림은 어떠셨나요?</h3>
        <p class="modal-subtitle">피드백은 더 정확한 추천에 도움이 됩니다.</p>

        <form id="feedbackForm">
            <div class="radio-group vertical">
                <div class="radio-option">
                    <input type="radio" id="f-very-cold" name="feedback-pref" value="-2" required>
                    <label for="f-very-cold">❄️ 매우 춥게 느껴짐</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="f-cold" name="feedback-pref" value="-1">
                    <label for="f-cold">🧊 조금 춥게 느껴짐</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="f-normal" name="feedback-pref" value="0" checked>
                    <label for="f-normal">☁️ 적당함 / 보통</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="f-hot" name="feedback-pref" value="1">
                    <label for="f-hot">☀️ 조금 덥게 느껴짐</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="f-very-hot" name="feedback-pref" value="2">
                    <label for="f-very-hot">🔥 매우 덥게 느껴짐</label>
                </div>
            </div>

            <button type="submit" class="main-action-btn">피드백 보내고 가중치 업데이트</button>
            <button type="button" class="close-modal-btn" onclick="closeModal()">피드백 건너뛰기</button>
        </form>
    </div>
</div>

<script>
    // 페이지 로드 시 닉네임과 체질 정보 불러오기
    window.onload = function() {
        const savedNickname = localStorage.getItem('nickname');
        const savedConstitution = localStorage.getItem('user_constitution');

        if (savedNickname) {
            document.getElementById('user-nickname').innerText = savedNickname;
        }

        console.log("현재 로그인 유저:", savedNickname);
        console.log("유저 체질 가중치:", savedConstitution);
    };

    // 추천받기 로직
    document.getElementById('recommendForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const tpo = document.querySelector('input[name="tpo"]:checked').value;
        const constitution = localStorage.getItem('user_constitution') || 0;

        alert(`TPO(${tpo})와 체질 가중치(${constitution})를 반영하여 옷차림을 계산합니다!`);
        // 여기서 나중에 진짜 추천 알고리즘 결과로 텍스트를 바꿔줄 수 있습니다.
        document.getElementById('recommend-result').innerText = "추천 계산 완료!";
    });

    // 모달 제어
    function openModal() { document.getElementById('feedbackModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('feedbackModal').style.display = 'none'; }
    document.querySelector('.feedback-btn').onclick = openModal;

    document.getElementById('feedbackForm').onsubmit = function(e) {
        e.preventDefault();
        alert('피드백이 반영되었습니다. 데이터베이스에 가중치를 업데이트합니다!');
        closeModal();
    };

    function editTemperature() {
        let newTemp = prompt("현재 기온을 숫자로 직접 입력해주세요 (예: 22):", "");
        if (newTemp !== null && newTemp.trim() !== "" && !isNaN(newTemp)) {
            document.getElementById('current-temp').innerText = newTemp;
            alert("기온이 " + newTemp + "°C로 수동 설정되었습니다.");
        }
    }
</script>
</body>
</html>
