<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatToWear - 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="login-card">
        <h1 class="logo">WhatToWear</h1>
        <p class="subtitle">오늘 날씨에 딱 맞는 옷차림을 추천해드려요.</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="loginId" placeholder="아이디" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>

        <div class="extra-links">
            <a href="signup.html" class="signup-link">회원가입</a>
        </div>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();

        const loginId = document.getElementById('loginId').value;
        const password = document.getElementById('password').value;

        fetch(`/api/members/login?loginId=${loginId}&password=${password}`, {
            method: 'POST'
        })
            // 1. response.text() 대신 response.json()으로 데이터를 읽어옵니다.
            .then(response => {
                if (!response.ok) {
                    throw new Error("로그인 실패");
                }
                return response.json();
            })
            .then(data => {
                // 2. 백엔드가 보낸 웰컴 메시지 출력
                alert(data.message);

                // 3. 로컬 스토리지에 아이디, 닉네임, 체질 가중치를 각각 소중히 저장합니다.
                localStorage.setItem('loggedInUser', loginId);
                localStorage.setItem('nickname', data.nickname);
                localStorage.setItem('user_constitution', data.constitution);

                // 4. 메인 화면으로 이동
                window.location.href = 'main.html';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('아이디 또는 비밀번호가 틀렸거나 서버 통신 오류입니다.');
            });
    });
</script>
</body>
</html>
